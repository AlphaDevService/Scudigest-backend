services:
  database:
    image: postgis/postgis:16-3.4
    volumes:
      - ./data/database:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "directus"
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: "directus"
    healthcheck:
      test: ["CMD", "pg_isready", "--host=localhost", "--username=directus"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7
    healthcheck:
      test: ["CMD-SHELL", "[ $$(redis-cli ping) = 'PONG' ]"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.14.0
    env_file: .env
    expose:
      - "8055"
    volumes:
      - ./extensions:/directus/extensions
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_ENABLED: "false"
      CACHE_STORE: "redis"
      REDIS: "redis://cache:6379"
      PUBLIC_URL: ${PUBLIC_URL}
      # S3 Storage (root: directus_files_nome-progetto)
      STORAGE_LOCATIONS: "s3"
      STORAGE_DEFAULT: "s3"
      STORAGE_S3_DRIVER: "s3"
      STORAGE_S3_KEY: ${AWS_ACCESS_KEY_ID}
      STORAGE_S3_SECRET: ${AWS_SECRET_ACCESS_KEY}
      STORAGE_S3_BUCKET: ${AWS_S3_BUCKET}
      STORAGE_S3_REGION: ${AWS_S3_REGION}
      STORAGE_S3_ROOT: "directus_files_nome-progetto"
      # Non impostare STORAGE_S3_ACL se il bucket ha "Bucket owner enforced" (ACL disabilitate)
      # CORS Configuration
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:3000,http://localhost:5173"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_CREDENTIALS: "true"

  fastapi-app:
    build: ./api
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      DATABASE_URL: "postgresql://directus:${DB_PASSWORD}@database:5432/directus"
      DB_PASSWORD: ${DB_PASSWORD}
    # volumes:
    #   - ./api:/app
    depends_on:
      database:
        condition: service_healthy
